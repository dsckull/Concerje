kind = "web"
previewPath = "/"
title = "Conserje — Gestão Condominial"
version = "1.0.0"
id = "artifacts/conserje"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23853

[services.development]
run = "pnpm --filter @workspace/conserje run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/conserje", "run", "build" ]
publicDir = "artifacts/conserje/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23853"
BASE_PATH = "/"
